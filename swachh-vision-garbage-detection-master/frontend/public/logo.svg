<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="url(#gradient)" stroke="#fff" stroke-width="2"/>
  
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9933;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#138808;stop-opacity:1" />
    </linearGradient>
    
    <!-- AI Circuit Pattern -->
    <pattern id="circuit" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="2" fill="#fff" opacity="0.3"/>
      <path d="M20 20 L35 20 M20 20 L20 5" stroke="#fff" stroke-width="1" opacity="0.2"/>
    </pattern>
  </defs>
  
  <!-- Gandhi Glasses Frame -->
  <g id="glasses">
    <!-- Left Lens -->
    <circle cx="70" cy="85" r="18" fill="none" stroke="#fff" stroke-width="3"/>
    <circle cx="70" cy="85" r="15" fill="url(#circuit)" opacity="0.5"/>
    
    <!-- Right Lens -->
    <circle cx="130" cy="85" r="18" fill="none" stroke="#fff" stroke-width="3"/>
    <circle cx="130" cy="85" r="15" fill="url(#circuit)" opacity="0.5"/>
    
    <!-- Bridge -->
    <path d="M88 85 Q100 80 112 85" fill="none" stroke="#fff" stroke-width="3"/>
    
    <!-- Temples -->
    <path d="M52 85 L40 90" stroke="#fff" stroke-width="3"/>
    <path d="M148 85 L160 90" stroke="#fff" stroke-width="3"/>
  </g>
  
  <!-- Broom Integration -->
  <g id="broom" transform="translate(100, 120)">
    <!-- Handle -->
    <rect x="-2" y="-20" width="4" height="25" fill="#8B4513" rx="1"/>
    
    <!-- Bristles -->
    <rect x="-8" y="5" width="16" height="12" fill="#D2691E" rx="2"/>
    <line x1="-6" y1="8" x2="-6" y2="15" stroke="#A0522D" stroke-width="1"/>
    <line x1="-3" y1="8" x2="-3" y2="15" stroke="#A0522D" stroke-width="1"/>
    <line x1="0" y1="8" x2="0" y2="15" stroke="#A0522D" stroke-width="1"/>
    <line x1="3" y1="8" x2="3" y2="15" stroke="#A0522D" stroke-width="1"/>
    <line x1="6" y1="8" x2="6" y2="15" stroke="#A0522D" stroke-width="1"/>
  </g>
  
  <!-- Text -->
  <text x="100" y="165" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#fff">
    SWACHH
  </text>
  <text x="100" y="180" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#fff">
    VISION
  </text>
  
  <!-- AI Circuit Lines -->
  <g opacity="0.3">
    <path d="M30 30 L50 30 L50 50" stroke="#fff" stroke-width="1" fill="none"/>
    <circle cx="30" cy="30" r="2" fill="#fff"/>
    <circle cx="50" cy="50" r="2" fill="#fff"/>
    
    <path d="M170 30 L150 30 L150 50" stroke="#fff" stroke-width="1" fill="none"/>
    <circle cx="170" cy="30" r="2" fill="#fff"/>
    <circle cx="150" cy="50" r="2" fill="#fff"/>
    
    <path d="M30 170 L50 170 L50 150" stroke="#fff" stroke-width="1" fill="none"/>
    <circle cx="30" cy="170" r="2" fill="#fff"/>
    <circle cx="50" cy="150" r="2" fill="#fff"/>
    
    <path d="M170 170 L150 170 L150 150" stroke="#fff" stroke-width="1" fill="none"/>
    <circle cx="170" cy="170" r="2" fill="#fff"/>
    <circle cx="150" cy="150" r="2" fill="#fff"/>
  </g>
</svg>
